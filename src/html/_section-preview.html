<section class="card card-preview" id="section-preview">
    <div class="card-header">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" />
            <polyline points="14 2 14 8 20 8" />
            <line x1="16" y1="13" x2="8" y2="13" />
            <line x1="16" y1="17" x2="8" y2="17" />
        </svg>
        <h2>Aperçu &amp; Téléchargement</h2>
        <div class="preview-actions">
            <button class="btn btn-ghost" id="btnCopy" aria-label="Copier le fichier actif dans le presse-papier">
                <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                    <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
                </svg>
                <span data-copy-label>Copier</span>
            </button>
            <button class="btn btn-primary" id="btnDownload">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                    <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4" />
                    <polyline points="7 10 12 15 17 10" />
                    <line x1="12" y1="15" x2="12" y2="3" />
                </svg>
                Télécharger ZIP
            </button>
        </div>
    </div>
    <div class="preview-tabs" id="previewTabs"></div>
    <div class="preview-content">
        <pre><code id="previewCode" class="hljs"></code></pre>
    </div>
</section>
