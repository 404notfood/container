<section class="card" id="section-project">
    <div class="card-header">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z" />
            <polyline points="9 22 9 12 15 12 15 22" />
        </svg>
        <h2>Projet</h2>
    </div>
    <div class="card-body">
        <div class="form-row">
            <div class="form-group">
                <label for="projectName">Nom du projet</label>
                <input type="text" id="projectName" value="my-app" placeholder="my-app" />
                <div class="field-error" id="projectName-error" role="alert"></div>
            </div>
            <div class="form-group">
                <label for="projectDomain">Domaine <span class="optional">(optionnel, pour SSL prod)</span></label>
                <input type="text" id="projectDomain" placeholder="example.com" />
                <div class="field-error" id="projectDomain-error" role="alert"></div>
            </div>
        </div>
        <div class="form-row mt-sm">
            <div class="form-group">
                <label for="gitRepoUrl">Repository Git <span class="optional">(optionnel)</span></label>
                <input type="text" id="gitRepoUrl" placeholder="https://github.com/user/repo.git" />
                <div class="field-error" id="gitRepoUrl-error" role="alert"></div>
            </div>
            <div class="form-group">
                <label for="gitBranch">Branche <span class="optional">(défaut : main)</span></label>
                <input type="text" id="gitBranch" placeholder="main" />
                <div class="field-error" id="gitBranch-error" role="alert"></div>
            </div>
        </div>
    </div>
</section>
