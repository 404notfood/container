<section class="card" id="section-backend">
    <div class="card-header">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <polyline points="16 18 22 12 16 6" />
            <polyline points="8 6 2 12 8 18" />
        </svg>
        <h2>Backend (Serveur)</h2>
    </div>
    <div class="card-body">
        <!-- PHP -->
        <div class="service-block">
            <label class="toggle-row">
                <input type="checkbox" id="enablePhp" class="toggle-input" />
                <span class="toggle-slider"></span>
                <span class="toggle-label">PHP-FPM</span>
            </label>
            <div class="service-options" id="phpOptions">
                <div class="form-group">
                    <label for="phpVersion">Version</label>
                    <select id="phpVersion">
                        <option value="8.1">8.1 (EOL 2025)</option>
                        <option value="8.2">8.2</option>
                        <option value="8.3">8.3</option>
                        <option value="8.4" selected>8.4 (LTS)</option>
                        <option value="8.5">8.5 (Latest)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Extensions</label>
                    <div class="checkbox-group" id="phpExtensionsGroup">
                        <label class="chip"><input type="checkbox" value="gd" checked /> gd</label>
                        <label class="chip"><input type="checkbox" value="intl" checked /> intl</label>
                        <label class="chip"><input type="checkbox" value="zip" checked /> zip</label>
                        <label class="chip"><input type="checkbox" value="pdo_mysql" /> pdo_mysql</label>
                        <label class="chip"><input type="checkbox" value="pdo_pgsql" /> pdo_pgsql</label>
                        <label class="chip"><input type="checkbox" value="redis" /> redis</label>
                        <label class="chip"><input type="checkbox" value="memcached" /> memcached</label>
                        <label class="chip"><input type="checkbox" value="opcache" checked /> opcache</label>
                        <label class="chip"><input type="checkbox" value="mbstring" checked /> mbstring</label>
                        <label class="chip"><input type="checkbox" value="xml" /> xml</label>
                        <label class="chip"><input type="checkbox" value="curl" checked /> curl</label>
                        <label class="chip"><input type="checkbox" value="imagick" /> imagick</label>
                        <label class="chip"><input type="checkbox" value="xdebug" /> xdebug</label>
                        <label class="chip"><input type="checkbox" value="bcmath" /> bcmath</label>
                        <label class="chip"><input type="checkbox" value="exif" /> exif</label>
                        <label class="chip"><input type="checkbox" value="soap" /> soap</label>
                    </div>
                </div>
            </div>
        </div>

        <!-- Node.js -->
        <div class="service-block">
            <label class="toggle-row">
                <input type="checkbox" id="enableNode" class="toggle-input" />
                <span class="toggle-slider"></span>
                <span class="toggle-label">Node.js</span>
            </label>
            <div class="service-options" id="nodeOptions">
                <div class="form-row">
                    <div class="form-group">
                        <label for="nodeVersion">Version</label>
                        <select id="nodeVersion">
                            <option value="18">18 (EOL 2025)</option>
                            <option value="20">20 LTS Iron</option>
                            <option value="22">22 LTS Jod</option>
                            <option value="24" selected>24 LTS Krypton (Latest)</option>
                            <option value="25">25 Current</option>
                            <option value="nvm">NVM (multi-version)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="nodeFramework">Framework</label>
                        <select id="nodeFramework">
                            <option value="custom" selected>Custom / Express</option>
                            <option value="nextjs">Next.js</option>
                            <option value="nuxt">Nuxt</option>
                        </select>
                    </div>
                </div>
                <div id="nvmDefaultVersion" class="form-group" style="display: none; margin-top: 0.5rem">
                    <label for="nvmDefault">Version par défaut NVM</label>
                    <input type="text" id="nvmDefault" value="24" placeholder="24" />
                </div>
                <div class="form-row port-row">
                    <div class="form-group form-group-port">
                        <label for="nodePort">Port</label>
                        <input type="number" id="nodePort" value="3000" placeholder="3000" min="1" max="65535" />
                    </div>
                </div>
            </div>
        </div>

        <!-- Python -->
        <div class="service-block">
            <label class="toggle-row">
                <input type="checkbox" id="enablePython" class="toggle-input" />
                <span class="toggle-slider"></span>
                <span class="toggle-label">Python</span>
            </label>
            <div class="service-options" id="pythonOptions">
                <div class="form-row">
                    <div class="form-group">
                        <label for="pythonVersionBackend">Version</label>
                        <select id="pythonVersionBackend">
                            <option value="3.10">3.10</option>
                            <option value="3.11">3.11</option>
                            <option value="3.12">3.12</option>
                            <option value="3.13" selected>3.13</option>
                            <option value="3.14">3.14 (Latest)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="pythonFrameworkBackend">Framework</label>
                        <select id="pythonFrameworkBackend">
                            <option value="custom" selected>Custom</option>
                            <option value="django">Django</option>
                            <option value="flask">Flask</option>
                            <option value="fastapi">FastAPI</option>
                        </select>
                    </div>
                </div>
                <div class="form-row port-row">
                    <div class="form-group form-group-port">
                        <label for="pythonPort">Port</label>
                        <input type="number" id="pythonPort" value="8000" placeholder="8000" min="1" max="65535" />
                    </div>
                </div>
            </div>
        </div>

        <!-- Java -->
        <div class="service-block">
            <label class="toggle-row">
                <input type="checkbox" id="enableJava" class="toggle-input" />
                <span class="toggle-slider"></span>
                <span class="toggle-label">Java (Spring Boot)</span>
            </label>
            <div class="service-options" id="javaOptions">
                <div class="form-row">
                    <div class="form-group">
                        <label for="javaVersionBackend">Version Java</label>
                        <select id="javaVersionBackend">
                            <option value="11">11 LTS</option>
                            <option value="17">17 LTS</option>
                            <option value="21" selected>21 LTS</option>
                            <option value="25">25 LTS (Latest)</option>
                        </select>
                    </div>
                </div>
                <div class="form-row port-row">
                    <div class="form-group form-group-port">
                        <label for="javaPort">Port</label>
                        <input type="number" id="javaPort" value="8080" placeholder="8080" min="1" max="65535" />
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
