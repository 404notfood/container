<section class="card" id="section-cache">
    <div class="card-header">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" />
        </svg>
        <h2>Cache &amp; File d'attente</h2>
    </div>
    <div class="card-body">
        <div class="service-block">
            <label class="toggle-row">
                <input type="checkbox" id="enableRedis" class="toggle-input" />
                <span class="toggle-slider"></span>
                <span class="toggle-label">Redis 7</span>
            </label>
        </div>
        <div class="service-block">
            <label class="toggle-row">
                <input type="checkbox" id="enableMemcached" class="toggle-input" />
                <span class="toggle-slider"></span>
                <span class="toggle-label">Memcached</span>
            </label>
        </div>
        <div class="service-block">
            <label class="toggle-row">
                <input type="checkbox" id="enableRabbitmq" class="toggle-input" />
                <span class="toggle-slider"></span>
                <span class="toggle-label">RabbitMQ</span>
            </label>
        </div>
    </div>
</section>
